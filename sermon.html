<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Full Sermon | Revival Fire Movement</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="about" style="min-height: 100vh; padding-top: 120px;">
  <h2 id="sermon-title" class="section-title"></h2>

  <div class="post-card" style="max-width: 800px; margin: 30px auto; text-align: left;">
    
    <img id="sermon-image" class="post-img">

    <small id="sermon-date"></small>

    <iframe id="sermon-video" width="100%" height="250" frameborder="0" allowfullscreen></iframe>

    <p id="sermon-body"></p>

    <br>
    <a href="index.html#sermons" class="btn">Back to Sermons</a>
  </div>
</section>
<script>
  const params = new URLSearchParams(window.location.search);

  document.getElementById("sermon-title").innerText = params.get("title");
  document.getElementById("sermon-date").innerText = params.get("date");
  document.getElementById("sermon-body").innerText = params.get("body");

  document.getElementById("sermon-image").src = params.get("image");
  document.getElementById("sermon-video").src = params.get("video");
</script>
  
</body>
</html>
